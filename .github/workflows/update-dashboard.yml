name: Update GA4 Dashboard Data

on:
  schedule:
    # Runs at 00:00 UTC every day (approx. 9:00 AM KST)
    - cron: '0 0 * * *'
  # Allows triggering the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up GA Credentials
        run: |
          echo '${{ secrets.GA_CREDENTIALS }}' > ga_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/ga_credentials.json" >> $GITHUB_ENV
          echo "GA_PROPERTY_ID=${{ secrets.GA_PROPERTY_ID }}" >> $GITHUB_ENV

      - name: Fetch GA4 Data
        run: python scripts/fetch_ga_data.py

      - name: Cleanup Credentials
        run: rm ga_credentials.json

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main
          git add data/ga_data.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update GA4 data [skip ci]" && git push)
